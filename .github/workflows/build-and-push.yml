name: Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'images/**'
      - '.github/workflows/build-and-push.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'images/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name to build (triggered by release-please)'
        required: true
        type: string
      tag:
        description: 'Tag to use'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      images: ${{ steps.changes.outputs.images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed images
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          CHANGED_DIRS=$(git diff --name-only $BASE_SHA ${{ github.sha }} | grep -E '^images/[^/]+/' | cut -d'/' -f2 | sort -u | jq -R . | jq -s -c .)
          echo "images=$CHANGED_DIRS" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.images != '[]'
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect-changes.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:test
      - run: |
          cd images/${{ matrix.image }}
          chmod +x test.sh
          ./test.sh ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:test

  # Build from push events (after tests pass)
  build-and-push:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: |
      github.event_name == 'push' &&
      needs.test.result == 'success' &&
      needs.detect-changes.outputs.images != '[]'
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect-changes.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.["images/${{ matrix.image }}"]' .release-please/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Docker image for ${{ matrix.image }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build from workflow_dispatch (release-please trigger, no test needed)
  build-and-push-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        image: ${{ fromJson(format('["{0}"]', inputs.image)) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get version
        id: version
        run: |
          VERSION=$(echo "${{ inputs.tag }}" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Docker image for ${{ matrix.image }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
