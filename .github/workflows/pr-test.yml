name: PR Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'images/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.changes.outputs.images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          CHANGED_DIRS=$(git diff --name-only $BASE_SHA ${{ github.sha }} | grep -E '^images/[^/]+/' | cut -d'/' -f2 | sort -u | jq -R . | jq -s -c .)
          echo "images=$CHANGED_DIRS" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.images != '[]'
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect-changes.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          load: true
          tags: test-image
      - run: |
          cd images/${{ matrix.image }}
          chmod +x test.sh
          ./test.sh test-image
